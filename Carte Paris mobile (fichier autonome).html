document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r infinite;\"></div>\n      <div style=\"font-size:14px;color:#5a6068;font-weight:500;max-width:280px;text-align:center;line-height:1.4;\">{{ statusText }}</div>\n    </div>\n  </sc-if>\n\n  <!-- ================= TOP CONTROLS ================= -->\n  <div style=\"position:absolute;top:0;left:0;right:0;z-index:600;padding:calc(env(safe-area-inset-top) + 10px) 12px 0;display:flex;flex-direction:column;gap:8px;pointer-events:none;\">\n    <form onsubmit=\"{{ onSearch }}\" style=\"pointer-events:auto;display:flex;align-items:stretch;background:#fff;border:1px solid #d7dade;border-radius:11px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.14);\">\n      <span style=\"display:flex;align-items:center;padding-left:13px;color:#9097a0;\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"></circle><line x1=\"21\" y1=\"21\" x2=\"16.5\" y2=\"16.5\"></line></svg>\n      </span>\n      <input value=\"{{ searchQ }}\" oninput=\"{{ onSearchInput }}\" placeholder=\"Rechercher une adresse…\" style=\"flex:1 1 auto;min-width:0;border:none;padding:12px 11px;font-family:inherit;font-size:16px;outline:none;background:transparent;\">\n      <button type=\"submit\" style=\"flex:0 0 auto;border:none;background:#16191d;color:#fff;padding:0 18px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;\">{{ searchBtn }}</button>\n    </form>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;pointer-events:none;\">\n      <div style=\"pointer-events:auto;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.95);border:1px solid #e6e8eb;border-radius:9px;padding:7px 11px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:12.5px;\">\n        <span style=\"color:#9097a0;font-weight:500;\">Niveau</span>\n        <span style=\"font-weight:700;\">{{ levelLabel }}</span>\n      </div>\n      <div style=\"pointer-events:auto;display:flex;border:1px solid #d7dade;border-radius:9px;overflow:hidden;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);\">\n        <button onclick=\"{{ setScoreMode }}\" style=\"padding:9px 13px;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;background:{{ scoreBg }};color:{{ scoreFg }};\">Score</button>\n        <button onclick=\"{{ setPriceMode }}\" style=\"padding:9px 13px;border:none;border-left:1px solid #d7dade;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;background:{{ prixBg }};color:{{ prixFg }};\">Prix/m²</button>\n      </div>\n    </div>\n\n    <sc-if value=\"{{ hasSearchMsg }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"pointer-events:auto;align-self:center;background:#16191d;color:#fff;font-size:12px;padding:6px 11px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.14);max-width:calc(100% - 8px);\">{{ searchMsg }}</div>\n    </sc-if>\n  </div>\n\n  <!-- ================= LEGEND ================= -->\n  <div style=\"position:absolute;left:12px;bottom:calc(env(safe-area-inset-bottom) + 96px);z-index:590;background:rgba(255,255,255,.95);border:1px solid #e6e8eb;border-radius:9px;padding:8px 11px;box-shadow:0 3px 14px rgba(0,0,0,.10);font-size:10.5px;pointer-events:none;\">\n    <div style=\"font-weight:600;margin-bottom:6px;\">{{ legendTitle }}</div>\n    <div style=\"width:150px;height:8px;border-radius:5px;background:{{ legendGradient }};\"></div>\n    <div style=\"display:flex;justify-content:space-between;margin-top:4px;color:#8a9099;font-weight:500;\">\n      <span>{{ legendLeft }}</span><span>{{ legendRight }}</span>\n    </div>\n  </div>\n\n  <!-- ================= LOCATE ME ================= -->\n  <div style=\"position:absolute;right:12px;bottom:calc(env(safe-area-inset-bottom) + 96px);z-index:590;pointer-events:auto;\">\n    <button onclick=\"{{ locateMe }}\" aria-label=\"Me géolocaliser\" style=\"width:44px;height:44px;border-radius:50%;border:1px solid #e6e8eb;background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.14);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#16191d;padding:0;\">\n      <sc-if value=\"{{ geoLoading }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"width:18px;height:18px;border-radius:50%;border:2.5px solid #d2d6db;border-top-color:#16191d;animation:spin .8s linear infinite;\"></div>\n      </sc-if>\n      <sc-if value=\"{{ geoIdle }}\" hint-placeholder-val=\"{{ true }}\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"></circle><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"5\"></line><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"22\"></line><line x1=\"2\" y1=\"12\" x2=\"5\" y2=\"12\"></line><line x1=\"19\" y1=\"12\" x2=\"22\" y2=\"12\"></line></svg>\n      </sc-if>\n    </button>\n  </div>\n\n  <!-- ================= BOTTOM SHEET ================= -->\n  <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:700;background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;box-shadow:0 -6px 26px rgba(0,0,0,.16);display:flex;flex-direction:column;max-height:86vh;padding-bottom:env(safe-area-inset-bottom);\">\n\n    <div onclick=\"{{ toggleSheet }}\" style=\"flex:0 0 auto;cursor:pointer;padding:9px 16px 5px;display:flex;flex-direction:column;align-items:center;gap:6px;\">\n      <div style=\"width:38px;height:4px;border-radius:3px;background:#d2d6db;\"></div>\n    </div>\n\n    <!-- PEEK: compact summary -->\n    <sc-if value=\"{{ mSheetPeek }}\" hint-placeholder-val=\"{{ true }}\">\n      <div onclick=\"{{ toggleSheet }}\" style=\"cursor:pointer;padding:2px 18px 16px;display:flex;align-items:center;gap:13px;\">\n        <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;flex:0 0 auto;background:{{ detail.color }};\">{{ detail.scoreR }}</div>\n          <div style=\"flex:1 1 auto;min-width:0;\">\n            <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#9097a0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ detail.arrLabel }}</div>\n            <div style=\"font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ detail.name }}</div>\n          </div>\n          <div style=\"flex:0 0 auto;color:#9097a0;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:5px;\">Détail\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"18 15 12 9 6 15\"></polyline></svg>\n          </div>\n        </sc-if>\n        <sc-if value=\"{{ noSelection }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"flex:1 1 auto;\">\n            <div style=\"font-size:15px;font-weight:700;\">Explore la carte</div>\n            <div style=\"font-size:12.5px;color:#8a9099;margin-top:1px;\">Touche une zone · pince pour zoomer et affiner</div>\n          </div>\n          <div style=\"flex:0 0 auto;color:#9097a0;display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;\">Menu\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"18 15 12 9 6 15\"></polyline></svg>\n          </div>\n        </sc-if>\n      </div>\n    </sc-if>\n\n    <!-- FULL: tabs + scrollable content -->\n    <sc-if value=\"{{ mSheetFull }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:0 0 auto;display:flex;gap:4px;padding:2px 12px 10px;border-bottom:1px solid #eceef0;\">\n        <button onclick=\"{{ onTabDetail }}\" style=\"flex:1 1 0;padding:9px 6px;border:none;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:{{ tabDetailBg }};color:{{ tabDetailFg }};\">Détail</button>\n        <button onclick=\"{{ onTabPond }}\" style=\"flex:1 1 0;padding:9px 6px;border:none;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:{{ tabPondBg }};color:{{ tabPondFg }};\">Réglages</button>\n        <button onclick=\"{{ onTabClass }}\" style=\"flex:1 1 0;padding:9px 6px;border:none;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:{{ tabClassBg }};color:{{ tabClassFg }};\">Top</button>\n        <button onclick=\"{{ onTabInfos }}\" style=\"flex:1 1 0;padding:9px 6px;border:none;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:{{ tabInfosBg }};color:{{ tabInfosFg }};\">Infos</button>\n      </div>\n\n      <div class=\"sb\" style=\"flex:1 1 auto;overflow-y:auto;min-height:0;max-height:64vh;\">\n\n        <!-- TAB: DÉTAIL -->\n        <sc-if value=\"{{ tabDetail }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"padding:16px 18px 22px;\">\n            <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:14px;\">\n                <div style=\"min-width:0;\">\n                  <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#9097a0;font-weight:600;\">{{ detail.arrLabel }}</div>\n                  <h2 style=\"margin:3px 0 0;font-size:22px;font-weight:700;letter-spacing:-.01em;\">{{ detail.name }}</h2>\n                  <div style=\"font-size:12.5px;color:#8a9099;margin-top:2px;\">{{ detail.hint }}</div>\n                </div>\n                <div style=\"text-align:center;flex:0 0 auto;\">\n                  <div style=\"width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800;background:{{ detail.color }};\">{{ detail.scoreR }}</div>\n                  <div style=\"font-size:10px;color:#9097a0;margin-top:3px;font-weight:600;\">/ 100</div>\n                </div>\n              </div>\n              <p style=\"margin:14px 0 12px;font-size:14px;line-height:1.5;color:#3a3f45;\">{{ detail.synthese }}</p>\n              <sc-if value=\"{{ detail.hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin:0 0 13px;padding:9px 12px;background:#f3f5f7;border-radius:8px;font-size:12px;line-height:1.45;color:#5a6068;\">{{ detail.note }}</div>\n              </sc-if>\n              <div style=\"display:flex;align-items:baseline;gap:7px;margin-bottom:16px;\">\n                <span style=\"font-size:12.5px;color:#6b7178;\">Prix estimé</span>\n                <span style=\"font-size:16px;font-weight:700;\">{{ detail.priceLabel }}</span>\n                <span style=\"font-size:11.5px;color:#a0a6ad;font-weight:500;\">€/m²</span>\n              </div>\n              <sc-for list=\"{{ detail.bars }}\" as=\"bar\" hint-placeholder-count=\"7\">\n                <div style=\"margin-bottom:11px;\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;\">\n                    <span style=\"color:#3a3f45;\">{{ bar.label }}</span>\n                    <span style=\"color:#9097a0;font-weight:600;\">{{ bar.scoreR }}</span>\n                  </div>\n                  <div style=\"height:7px;border-radius:4px;background:#edeff1;overflow:hidden;\">\n                    <div style=\"height:7px;border-radius:4px;background:{{ bar.color }};width:{{ bar.width }};\"></div>\n                  </div>\n                </div>\n              </sc-for>\n            </sc-if>\n            <sc-if value=\"{{ noSelection }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"padding:30px 6px;text-align:center;color:#9aa0a7;font-size:14px;line-height:1.5;\">Touche une zone sur la carte pour voir le détail.<br>Pince pour zoomer&nbsp;: arrondissements → quartiers → rues (IRIS).</div>\n            </sc-if>\n          </div>\n        </sc-if>\n\n        <!-- TAB: RÉGLAGES -->\n        <sc-if value=\"{{ tabPond }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:16px 18px 22px;\">\n            <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#9097a0;font-weight:700;margin-bottom:7px;\">Mes pondérations</div>\n            <p style=\"margin:0 0 11px;font-size:12px;color:#9097a0;line-height:1.4;\">Ajuste les curseurs — ou isole un seul critère&nbsp;:</p>\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;\">\n              <button onclick=\"{{ setProfile }}\" style=\"padding:8px 12px;border:1px solid {{ profileBd }};border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;background:{{ profileBg }};color:{{ profileFg }};\">Mon profil</button>\n              <sc-for list=\"{{ chips }}\" as=\"ch\" hint-placeholder-count=\"7\">\n                <button onclick=\"{{ ch.onClick }}\" style=\"padding:8px 12px;border:1px solid {{ ch.bd }};border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;background:{{ ch.bg }};color:{{ ch.fg }};\">{{ ch.label }}</button>\n              </sc-for>\n            </div>\n            <sc-for list=\"{{ sliders }}\" as=\"c\" hint-placeholder-count=\"7\">\n              <div style=\"margin-bottom:16px;\">\n                <div style=\"display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:7px;\">\n                  <span style=\"font-weight:500;\">{{ c.label }}</span>\n                  <span style=\"color:#9097a0;font-weight:700;\">{{ c.weight }}</span>\n                </div>\n                <input type=\"range\" min=\"0\" max=\"10\" step=\"1\" value=\"{{ c.weight }}\" oninput=\"{{ c.onInput }}\" style=\"width:100%;height:26px;accent-color:#16191d;cursor:pointer;\">\n              </div>\n            </sc-for>\n            <button onclick=\"{{ saveProfile }}\" disabled=\"{{ saveDisabled }}\" style=\"margin-top:4px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 12px;border:1px solid {{ saveBd }};border-radius:10px;font-size:13.5px;font-weight:600;cursor:{{ saveCursor }};font-family:inherit;background:{{ saveBg }};color:{{ saveFg }};\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z\"></path><polyline points=\"17 21 17 13 7 13 7 21\"></polyline><polyline points=\"7 3 7 8 15 8\"></polyline></svg>\n              {{ saveLabel }}\n            </button>\n            <p style=\"margin:9px 2px 0;font-size:11px;line-height:1.45;color:#a8aeb5;\">«&nbsp;Mon profil&nbsp;» recharge ta configuration sauvegardée (conservée sur cet appareil).</p>\n          </div>\n        </sc-if>\n\n        <!-- TAB: CLASSEMENT -->\n        <sc-if value=\"{{ tabClass }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:14px 14px 24px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin:0 4px 10px;\">\n              <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#9097a0;font-weight:700;\">Classement des quartiers</div>\n              <span style=\"font-size:11px;color:#a0a6ad;\">{{ count }}</span>\n            </div>\n            <sc-for list=\"{{ ranked }}\" as=\"r\" hint-placeholder-count=\"12\">\n              <div onclick=\"{{ r.onClick }}\" style=\"display:flex;align-items:center;gap:11px;padding:10px 10px;border-radius:9px;cursor:pointer;background:{{ r.rowBg }};margin-bottom:2px;\">\n                <span style=\"font-size:12px;color:#a0a6ad;font-weight:700;width:24px;text-align:right;flex:0 0 auto;\">{{ r.rank }}</span>\n                <span style=\"width:12px;height:12px;border-radius:50%;background:{{ r.color }};flex:0 0 auto;\"></span>\n                <div style=\"flex:1 1 auto;min-width:0;\">\n                  <div style=\"font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ r.name }}</div>\n                  <div style=\"font-size:11.5px;color:#a0a6ad;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ r.sub }}</div>\n                </div>\n                <span style=\"font-size:15px;font-weight:800;color:{{ r.color }};width:32px;text-align:right;flex:0 0 auto;\">{{ r.scoreR }}</span>\n              </div>\n            </sc-for>\n          </div>\n        </sc-if>\n\n        <!-- TAB: INFOS -->\n        <sc-if value=\"{{ tabInfos }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:16px 18px 24px;\">\n            <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#9097a0;font-weight:700;margin-bottom:9px;\">Sources &amp; méthode</div>\n            <p style=\"margin:0 0 13px;font-size:12.5px;line-height:1.5;color:#3a3f45;\">Trois niveaux de zoom, frontières <b>réelles</b> à chaque échelle&nbsp;: <b>arrondissements</b> (20), <b>quartiers</b> (80), <b>IRIS</b> (~990, maille INSEE de ~2 000 hab.). Chaque zone reçoit 7 sous-notes (0–100), pondérées par tes curseurs puis moyennées&nbsp;; les couleurs sont étirées sur l’étendue parisienne du moment.</p>\n            <div style=\"display:flex;flex-direction:column;gap:11px;font-size:12.5px;line-height:1.5;\">\n              <div>\n                <div style=\"font-weight:600;\">Frontières &amp; IRIS</div>\n                <div style=\"color:#5a6068;\"><a href=\"https://opendata.paris.fr/explore/dataset/quartier_paris/\" target=\"_blank\" rel=\"noopener\" style=\"color:#2a6fdb;text-decoration:none;\">Open Data Paris ↗</a> · <a href=\"https://public.opendatasoft.com/explore/dataset/georef-france-iris/\" target=\"_blank\" rel=\"noopener\" style=\"color:#2a6fdb;text-decoration:none;\">IRIS Opendatasoft/INSEE ↗</a>. À l’IRIS, 6 critères sur 7 sont calculés localement.</div>\n              </div>\n              <div>\n                <div style=\"font-weight:600;\">Prix au m²</div>\n                <div style=\"color:#5a6068;\">Médiane DVF 2023-2025 (~81 000 ventes) à l’IRIS · ordres de grandeur 2025-26 ailleurs.<br><a href=\"https://app.dvf.etalab.gouv.fr/\" target=\"_blank\" rel=\"noopener\" style=\"color:#2a6fdb;text-decoration:none;\">DVF / Etalab ↗</a> · <a href=\"https://www.meilleursagents.com/prix-immobilier/paris-75000/\" target=\"_blank\" rel=\"noopener\" style=\"color:#2a6fdb;text-decoration:none;\">MeilleursAgents ↗</a></div>\n              </div>\n              <div>\n                <div style=\"font-weight:600;\">Sécurité — QPV 2024</div>\n                <div style=\"color:#5a6068;\">Proxy socio-économique (pas une stat de délinquance). Part de l’IRIS couverte par un <b>QPV 2024</b> (polygones officiels ANCT).<br><a href=\"https://www.data.gouv.fr/fr/datasets/quartiers-prioritaires-politique-de-la-ville-anct-26avril2024/\" target=\"_blank\" rel=\"noopener\" style=\"color:#2a6fdb;text-decoration:none;\">ANCT — QPV 2024 ↗</a></div>\n              </div>\n              <div>\n                <div style=\"font-weight:600;\">Ambiance · transports · centralité</div>\n                <div style=\"color:#5a6068;\">Terrasses de café (<a href=\"https://opendata.paris.fr/explore/dataset/terrasses-autorisations/\" target=\"_blank\" rel=\"noopener\" style=\"color:#2a6fdb;text-decoration:none;\">Paris OpenData ↗</a>), gares à 450 m (<a href=\"https://data.iledefrance-mobilites.fr/\" target=\"_blank\" rel=\"noopener\" style=\"color:#2a6fdb;text-decoration:none;\">IDFM ↗</a>), distance à République. Scores = appréciation <i>relative</i> pour ton profil  && e && e.latlng) this.showTip(name, e.latlng); this.openDetail(); });\n  }\n  showTip(html, latlng){\n    const L = window.L;\n    if (!this._tip){ this._tip = L.tooltip({ className:'secteur-tt', direction:'top', offset:[0,-8], pane:'tooltipPane' }); }\n    this._tip.setContent(html).setLatLng(latlng);\n    if (!this._tip._map) this._tip.addTo(this.map);\n    clearTimeout(this._tipT);\n    this._tipT = setTimeout(()=>this.hideTip(), 2200);\n  }\n  hideTip(){ if (this._tip && this._tip._map) this.map.removeLayer(this._tip); }\n\n  irisCodeAt(lon, lat){\n    if (!this.irisByCode) return null;\n    for (const code in this.irisByCode){\n      const it = this.irisByCode[code];\n      const b = it.bbox; if (!b) continue;\n      if (lon<b[0]||lon>b[2]||lat<b[1]||lat>b[3]) continue;\n      if (this.geomContains([lon,lat], it.geom)) return code;\n    }\n    return null;\n  }\n  placeMarker(lat, lon){\n    const L = window.L;\n    if (this.searchMarker){ this.map.removeLayer(this.searchMarker); this.searchMarker = null; }\n    const icon = L.divIcon({ className:'', iconSize:[20,20], iconAnchor:[10,10],\n      html:'<div style=\"width:14px;height:14px;border-radius:50%;background:#16191d;border:3px solid #fff;box-shadow:0 0 0 1.5px #16191d,0 2px 7px rgba(0,0,0,.45);\"></div>' });\n    this.searchMarker = L.marker([lat,lon], { icon, keyboard:false }).addTo(this.map);\n  }\n  selectAt(lon, lat){\n    const q = this.quartierAt([lon,lat]);\n    const code = this.irisCodeAt(lon, lat);\n    if (code) this.selectIris(code);\n    else if (q!=null) this.selectQuartier(q);\n    if (!code) this._pendingPoint = [lon,lat];\n  }\n  placeUserMarker(lat, lon, accuracy){\n    const L = window.L;\n    if (this.userAccuracyCircle){ this.map.removeLayer(this.userAccuracyCircle); this.userAccuracyCircle = null; }\n    if (this.userMarker){ this.map.removeLayer(this.userMarker); this.userMarker = null; }\n    if (accuracy && accuracy > 0){\n      this.userAccuracyCircle = L.circle([lat,lon], { radius:accuracy, color:'#1a73e8', weight:1, fillColor:'#1a73e8', fillOpacity:.12, interactive:false }).addTo(this.map);\n    }\n    const icon = L.divIcon({ className:'', iconSize:[22,22], iconAnchor:[11,11],\n      html:'<div style=\"width:16px;height:16px;border-radius:50%;background:#1a73e8;border:3px solid #fff;box-shadow:0 0 0 1.5px #1a73e8,0 2px 7px rgba(0,0,0,.45);\"></div>' });\n    this.userMarker = L.marker([lat,lon], { icon, keyboard:false, interactive:false, zIndexOffset:500 }).addTo(this.map);\n  }\n  locateMe = () => {\n    if (this.state.geoLoading) return;\n    if (!navigator.geolocation){ this.setState({ searchMsg:'Géolocalisation non disponible sur cet appareil.' }); return; }\n    this.setState({ geoLoading:true, searchMsg:'' });\n    navigator.geolocation.getCurrentPosition(\n      (pos) => {\n        const lat = pos.coords.latitude, lon = pos.coords.longitude, accuracy = pos.coords.accuracy;\n        this.setState({ geoLoading:false });\n        try {\n          this.placeUserMarker(lat, lon, accuracy);\n          this.map.setView([lat,lon], Math.max(this.map.getZoom(), 15));\n        } catch(e){}\n        if (lon>=2.20 && lon<=2.48 && lat>=48.79 && lat<=48.92){\n          this.ensureIris();\n          this.selectAt(lon, lat);\n          this.openDetail();\n        } else {\n          this.setState({ searchMsg:'Tu es hors de Paris intra-muros.' });\n        }\n      },\n      (err) => {\n        let msg = 'Localisation impossible.';\n        if (err){\n          if (err.code === 1) msg = 'Localisation refusée. Autorise l’accès à ta position dans les réglages du navigateur.';\n          else if (err.code === 2) msg = 'Position indisponible.';\n          else if (err.code === 3) msg = 'Délai de localisation dépassé.';\n        }\n        this.setState({ geoLoading:false, searchMsg:msg });\n      },\n      { enableHighAccuracy:true, timeout:10000, maximumAge:60000 }\n    );\n  };\n  onSearchInput = (e) => { this.setState({ searchQ:e.target.value }); };\n  onSearch = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    if (e && e.target){ const inp = e.target.querySelector && e.target.querySelector('input'); if (inp) inp.blur(); }\n    this.geocode();\n  };\n  async geocode(){\n    const q = (this.state.searchQ||'').trim();\n    if (!q){ return; }\n    this.setState({ searching:true, searchMsg:'' });\n    let lon, lat, label;\n    try {\n      const u = 'https://api-adresse.data.gouv.fr/search/?limit=1&q=' + encodeURIComponent(q);\n      const r = await fetch(u);\n      const j = await r.json();\n      const f = j && j.features && j.features[0];\n      if (!f){ this.setState({ searching:false, searchMsg:'Adresse introuvable.' }); return; }\n      [lon, lat] = f.geometry.coordinates; label = f.properties.label || '';\n    } catch(e){ this.setState({ searching:false, searchMsg:'Erreur de recherche (réseau).' }); return; }\n\n    if (lon<2.20 || lon>2.48 || lat<48.79 || lat>48.92){ this.setState({ searching:false, searchMsg:'Hors de Paris intra-muros.' }); return; }\n    this.setState({ searching:false, searchMsg:label });\n    try {\n      this.placeMarker(lat, lon);\n      this.map.setView([lat,lon], 15);\n      this.ensureIris();\n      this.selectAt(lon, lat);\n      this.openDetail();\n    } catch(e){}\n  }\n\n  recolorAll(){ if (this.dataLayer) this.dataLayer.setStyle((f)=>this.styleFor(f)); }\n  applyHighlight(){\n    const sel = this.state.sel;\n    const next = sel ? (this._featLayers||{})[sel.level+':'+sel.key] : null;\n    const prev = this._selLayer;\n    if (prev && prev!==next){ try { this.dataLayer.resetStyle(prev); } catch(e){} }\n    if (next){ try { this.dataLayer.resetStyle(next); } catch(e){} }\n    this._selLayer = next || null;\n  }\n  componentDidUpdate(){\n    if (!this.dataLayer) return;\n    const w=this.state.weights, m=this.state.colorMode;\n    if (this._pw!==w || this._pm!==m){ this._pw=w; this._pm=m; this.recolorAll(); }\n    if (this._ps!==this.state.sel){ this._ps=this.state.sel; this.applyHighlight(); }\n  }\n\n  selectKey(kind, key){\n    const s = this.state.sel;\n    if (s && s.level===kind && s.key===key) return;\n    this.setState({ sel:{ level:kind, key:key } });\n  }\n  selectArr(n){ this.selectKey('arr', n); }\n  selectQuartier(q){ this.selectKey('quartier', q); }\n  selectIris(code){ this.selectKey('iris', code); }\n  flyToLayer(layer){ try { this.map.fitBounds(layer.getBounds(), { padding:[40,40], maxZoom:15 }); } catch(e){} }\n  flyToQuartier(q){\n    const g = (this.qGeoms||[]).find(x=>x.q===q);\n    if (g){ const b=g.bbox; try { this.map.fitBounds([[b[1],b[0]],[b[3],b[2]]], { padding:[40,40], maxZoom:15 }); } catch(e){} }\n  }\n\n  setWeight(key,val){ this.setState(s=>({ weights:{ ...s.weights, [key]:val } })); }\n  setProfile = () => this.setState({ weights: this.loadProfile() || { ...this.DEFAULT_WEIGHTS } });\n  saveProfile = () => {\n    const w = { ...this.state.weights };\n    try { localStorage.setItem(this.SAVE_KEY, JSON.stringify(w)); } catch(e){}\n    this.setState({ savedWeights:w, savedFlash:true });\n    clearTimeout(this._flashT);\n    this._flashT = setTimeout(() => this.setState({ savedFlash:false }), 1800);\n  };\n  isolate(key){ const w={}; for(const c of this.CRITERIA) w[c.key]=0; w[key]=1; this.setState({ weights:w }); }\n  setScoreMode = () => this.setState({ colorMode:'score' });\n  setPriceMode = () => this.setState({ colorMode:'prix' });\n\n  synthese(score, sub){\n    let head;\n    if (score>=72) head='Excellent terrain de chasse pour ton profil.';\n    else if (score>=60) head='Bonne option, sérieuse à creuser.';\n    else if (score>=50) head='Correct — à arbitrer selon la rue exacte.';\n    else if (score>=40) head='Compromis tendu pour ce que tu cherches.';\n    else head='Plutôt à éviter au vu de tes critères.';\n    const items=[['ambiance','l’ambiance'],['calme','le calme'],['securite','la tranquillité (hors QPV)'],['prix','le rapport qualité/prix'],['centralite','la centralité'],['transports','les transports'],['liquidite','la revente']];\n    let strong='',sv=-1,weak='',wv=101;\n    for(const [k,l] of items){ if(sub[k]>sv){sv=sub[k];strong=l;} if(sub[k]<wv){wv=sub[k];weak=l;} }\n    return `${head} Atout : ${strong}. Point de vigilance : ${weak}.`;\n  }\n\n  renderVals(){\n    const w=this.state.weights;\n    const isScore=this.state.colorMode==='score';\n    const fmt=(n)=>Math.round(n).toLocaleString('fr-FR');\n    const [slo,shi]=this.scoreRange(w), [plo,phi]=this.effPriceRange();\n    const colorScore=(s)=>this.colorScaled(s,slo,shi);\n\n    const active=this.CRITERIA.filter(c=>w[c.key]>0);\n    const isolated=active.length===1 ? active[0].key : null;\n\n    const scored=this.QUARTIERS.map(d=>({d,score:this.globalScore(d,w)})).sort((a,b)=>b.score-a.score);\n    const ranked=scored.map((o,i)=>({\n      rank:i+1, name:o.d.name, sub:`${o.d.arr} · ${o.d.hint}`,\n      scoreR:Math.round(o.score), color:colorScore(o.score),\n      rowBg:(this.state.sel&&this.state.sel.level==='quartier'&&this.state.sel.key===o.d.q)?'#eef1f4':'transparent',\n      onClick:()=>{ this.selectQuartier(o.d.q); this.flyToQuartier(o.d.q); this.openDetail(); },\n    }));\n\n    const sliders=this.CRITERIA.map(c=>({ key:c.key, label:c.label, weight:w[c.key], onInput:(e)=>this.setWeight(c.key,+e.target.value) }));\n\n    const refW = this.state.savedWeights || this.DEFAULT_WEIGHTS;\n    const dirty = this.CRITERIA.some(c => (w[c.key]||0) !== (refW[c.key]||0));\n    const flash = this.state.savedFlash;\n    const saveLabel = flash ? 'Profil enregistré' : (this.state.savedWeights ? (dirty?'Mettre à jour mon profil':'Profil à jour') : 'Sauvegarder mon profil');\n    const saveActive = flash || dirty;\n    const chips=this.CRITERIA.map(c=>{ const on=isolated===c.key; return { label:c.short, onClick:()=>this.isolate(c.key), bg:on?'#16191d':'#fff', fg:on?'#fff':'#3a3f45', bd:on?'#16191d':'#d7dade' }; });\n\n    let detail=null; const sel=this.state.sel;\n    const barsFrom=(sub)=>this.CRITERIA.map(c=>({ label:c.label, scoreR:Math.round(sub[c.key]), color:this.colorScaled(sub[c.key],30,98), width:`${Math.round(sub[c.key])}%` }));\n    if (sel){\n      if (sel.level==='arr'){\n        const n=sel.key, sub=this.arrSub(n,w), score=this.arrScore(n,w);\n        detail={ name:this.arrName(n), arrLabel:'Arrondissement · vue d’ensemble', hint:`Moyenne des ${ (this.byArr()[n]||[]).length } quartiers`,\n          scoreR:Math.round(score), color:colorScore(score), priceLabel:fmt(this.arrPrix(n)),\n          synthese:this.synthese(score,sub), bars:barsFrom(sub), hasNote:true,\n          note:'Vue agrégée : zoome pour comparer les quartiers, puis les IRIS.' };\n      } else if (sel.level==='quartier'){\n        const d=this.byQ()[sel.key], sub=this.subScores(d), score=this.globalFromSub(sub,w);\n        detail={ name:d.name, arrLabel:`${d.arr} · quartier · ${this.priceScore(d.prix)>=50?'dans le budget':'au-dessus de ma limite'}`, hint:d.hint,\n          scoreR:Math.round(score), color:colorScore(score), priceLabel:fmt(d.prix),\n          synthese:this.synthese(score,sub), bars:barsFrom(sub), hasNote:false, note:'' };\n      } else if (sel.level==='iris'){\n        const it=this.irisByCode[sel.key], r=it&&this.irisSub(it), d=it&&this.byQ()[it.q];\n        if (r&&d){\n          const info=r.info, score=this.globalFromSub(r.sub,w);\n          detail={ name:it.name, arrLabel:`${d.arr} · IRIS ${it.code}`, hint:`dans le quartier ${d.name}`,\n            scoreR:Math.round(score), color:colorScore(score), priceLabel:fmt(info.prix!=null?info.prix:d.prix),\n            synthese:this.synthese(score,r.sub), bars:barsFrom(r.sub), hasNote:true,\n            note: r.geo\n              ? `Données réelles à l’IRIS : ${info.real?`prix médian DVF sur ${info.n} ventes`:'prix hérité (trop peu de ventes)'}, ambiance (${r.geo[0]} terrasses), transports (${r.geo[1]} gares à 450 m), centralité (${(r.geo[2]/1000).toFixed(1)} km de République), sécurité (${r.real&&r.real.securite?`${Math.round((r.real.qpv||0)*100)} % en QPV 2024`:'héritée du quartier'}).`\n              : `Données IRIS indisponibles : notes héritées du quartier.` };\n        } else {\n          detail={ name:(it&&it.name)||'IRIS', arrLabel:'IRIS · hors zonage', hint:'', scoreR:0, color:'#cfd4d9', priceLabel:'—', synthese:'Pas de quartier rattaché.', bars:[], hasNote:false, note:'' };\n        }\n      }\n    }\n\n    const levelLabel = this.state.level==='arr' ? 'Arrondissements' : (this.state.level==='iris' ? 'IRIS' : 'Quartiers');\n    const mTab=this.state.mTab, mSheet=this.state.mSheet;\n    const tabBg=(on)=>on?'#16191d':'#f1f3f5', tabFg=(on)=>on?'#fff':'#6b7178';\n\n    return {\n      mapRefCb:this.mapRefCb, count:`${this.QUARTIERS.length} quartiers`,\n      ranked, sliders, chips,\n      searchQ:this.state.searchQ, onSearch:this.onSearch, onSearchInput:this.onSearchInput,\n      searchBtn:this.state.searching ? '…' : 'OK',\n      searchMsg:this.state.searchMsg, hasSearchMsg:!!this.state.searchMsg,\n      showStatus:!!this.state.status, statusText:this.state.status||'',\n      levelLabel,\n      locateMe:this.locateMe, geoLoading:this.state.geoLoading, geoIdle:!this.state.geoLoading,\n      hasSelection:!!detail, noSelection:!detail,\n      detail:detail||{ name:'',arrLabel:'',hint:'',scoreR:0,color:'#ccc',priceLabel:'',synthese:'',bars:[],hasNote:false,note:'' },\n      setProfile:this.setProfile,\n      saveProfile:this.saveProfile, saveLabel,\n      saveDisabled: !saveActive,\n      saveCursor: saveActive ? 'pointer' : 'default',\n      saveBg: flash ? '#1f8a5b' : (dirty ? '#16191d' : '#eef1f4'),\n      saveFg: flash ? '#fff' : (dirty ? '#fff' : '#9097a0'),\n      saveBd: flash ? '#1f8a5b' : (dirty ? '#16191d' : '#e2e5e8'),\n      profileBg:isolated===null?'#16191d':'#fff', profileFg:isolated===null?'#fff':'#3a3f45', profileBd:isolated===null?'#16191d':'#d7dade',\n      setScoreMode:this.setScoreMode, setPriceMode:this.setPriceMode,\n      scoreBg:isScore?'#16191d'
